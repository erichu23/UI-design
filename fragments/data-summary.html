<!DOCTYPE html>
<html lang="zh-Hans-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="../assets/css/pages/data-summary.css?v=20260508-vat-compare-10"/>
</head>
<body>
  <div class="ds3-page ds3-vat-page">
    <section class="ds3-block">
      <div class="ds3-block-head">
        <div class="ds3-block-title">筛选条件</div>
        <button class="ds3-fold" type="button">收起</button>
      </div>
      <div class="ds3-block-body">
        <div class="ds3-filter-grid ds3-vat-filter-grid">
          <div class="ds3-field"><label>被审计单位</label><select id="ds3Unit"></select></div>
          <div class="ds3-field"><label>公司账户</label><select id="ds3Account"></select></div>
          <div class="ds3-field"><label>对手方类型</label><select id="ds3Type"></select></div>
          <div class="ds3-field"><label>对手方名称</label><input id="ds3Keyword" placeholder="输入名称关键词"/></div>
          <div class="ds3-field"><label>年份</label><select id="ds3Year"></select></div>
          <div class="ds3-field">
            <label>对比视角</label>
            <select id="ds3CompareView">
              <option value="all">全部</option>
              <option value="in">银行流入 vs 销项税价合计</option>
              <option value="out">银行流出 vs 进项税价合计</option>
            </select>
          </div>
          <div class="ds3-field">
            <label>账期口径</label>
            <select id="ds3PeriodOffset">
              <option value="same">同期</option>
              <option value="minus1">税票前移1月</option>
              <option value="plus1">税票后移1月</option>
              <option value="custom">自定义平移</option>
            </select>
            <div class="ds3-custom-period" id="ds3CustomPeriodWrap">
              <span>税票平移</span>
              <input id="ds3CustomPeriodShift" type="number" min="-12" max="12" value="0"/>
              <span>月</span>
            </div>
          </div>
          <div class="ds3-field">
            <label>账期对象</label>
            <select id="ds3PeriodBasis">
              <option value="all">全部</option>
              <option value="receipt">收款</option>
              <option value="payment">付款</option>
            </select>
          </div>
          <div class="ds3-field ds3-month-field"><label>月份范围</label><div id="ds3MonthSelect"></div></div>
          <div class="ds3-actions">
            <button class="ds3-btn is-primary" id="ds3ApplyBtn" type="button">查询</button>
            <button class="ds3-btn" id="ds3ResetBtn" type="button">重置</button>
          </div>
        </div>
      </div>
    </section>

    <section class="ds3-block">
      <div class="ds3-block-head"><div class="ds3-block-title">核心指标概览</div><button class="ds3-fold" type="button">收起</button></div>
      <div class="ds3-block-body"><div class="ds3-vat-kpi-grid" id="ds3KpiGrid"></div></div>
    </section>

    <section class="ds3-block">
      <div class="ds3-block-head"><div class="ds3-block-title">月度对比趋势</div><button class="ds3-fold" type="button">收起</button></div>
      <div class="ds3-block-body">
        <div class="ds3-chart-toolbar">
          <div class="ds3-month-toolbar" id="ds3MonthToolbar"></div>
          <div class="ds3-segment ds3-chart-type-switch" id="ds3ChartTypeSwitch">
            <button class="is-active" data-chart-type="bar" type="button">柱状图</button>
            <button data-chart-type="line" type="button">折线图</button>
          </div>
        </div>
        <div class="ds3-grid-2">
          <div class="ds3-panel" data-view-panel="in"><div class="ds3-panel-title">银行流入 vs 销项税价合计（月度）</div><div class="ds3-chart" id="ds3InChart"></div></div>
          <div class="ds3-panel" data-view-panel="out"><div class="ds3-panel-title">银行流出 vs 进项税价合计（月度）</div><div class="ds3-chart" id="ds3OutChart"></div></div>
        </div>
      </div>
    </section>

    <section class="ds3-block">
      <div class="ds3-block-head"><div class="ds3-block-title">对比分析摘要</div><button class="ds3-fold" type="button">收起</button></div>
      <div class="ds3-block-body">
        <div class="ds3-vat-summary-grid">
          <div class="ds3-panel ds3-summary-panel"><div class="ds3-panel-title">当前查看摘要</div><div class="ds3-summary-list" id="ds3CurrentSummary"></div><div class="ds3-chip-row" id="ds3Chips"></div></div>
          <div class="ds3-panel ds3-period-panel">
            <div class="ds3-panel-headline">
              <div class="ds3-panel-title">账期口径摘要</div>
              <button class="ds3-help-dot" type="button" title="用于查看不同账期口径下的摘要结果，并将选定口径应用到整页分析">?</button>
            </div>
            <div class="ds3-period-summary" id="ds3PeriodSummary"></div>
          </div>
          <div class="ds3-panel ds3-composition-panel"><div class="ds3-panel-headline"><div class="ds3-panel-title">对手方金额构成</div><div class="ds3-segment ds3-composition-switch" id="ds3CompositionMetric"><button class="is-active" data-composition-rank="inflow" type="button">流入前20</button><button data-composition-rank="outflow" type="button">流出前20</button><button data-composition-rank="salesVat" type="button">销项前20</button><button data-composition-rank="purchaseVat" type="button">进项前20</button></div></div><div class="ds3-composition-centipede" id="ds3Composition"></div></div>
        </div>
      </div>
    </section>

    <section class="ds3-block">
      <div class="ds3-block-head"><div class="ds3-block-title">对手方对比明细</div><button class="ds3-fold" type="button">收起</button></div>
      <div class="ds3-block-body">
        <div class="ds3-section-head ds3-vat-table-head">
          <div class="ds3-table-view-line">
            <div class="ds3-segment" id="ds3TableViewTabs"><button class="is-active" data-view="summary" type="button">合计视图</button><button data-view="monthly" type="button">月度视图</button></div>
            <div class="ds3-section-desc" id="ds3TableContext"></div>
          </div>
          <div class="ds3-section-actions">
            <button class="ds3-btn" id="ds3ClearMonthBtn" type="button">清除月份筛选</button>
            <button class="ds3-btn" id="ds3ClearCounterpartyBtn" type="button">清除对手方筛选</button>
            <button class="ds3-btn" id="ds3ViewSelectedBtn" type="button">查看勾选结果</button>
            <button class="ds3-btn" id="ds3BatchShiftBtn" type="button">批量平移账期</button>
            <button class="ds3-btn is-primary" id="ds3ExportBtn" type="button">导出当前结果</button>
          </div>
        </div>
        <div class="ds3-table-wrap">
          <table class="ds3-table ds3-table-compact" id="ds3FilterTable">
            <thead id="ds3FilterTableHead"></thead>
            <tbody id="ds3FilterTableBody"></tbody>
          </table>
        </div>
        <div class="ds3-pagination" id="ds3Pagination"></div>
      </div>
    </section>

    <div class="ds3-modal" id="ds3DetailModal">
      <div class="ds3-modal-panel ds3-modal-panel-xl">
        <div class="ds3-modal-head"><div class="ds3-modal-title" id="ds3DetailTitle">对手方详情</div><button class="ds3-close" id="ds3DetailClose" type="button">×</button></div>
        <div class="ds3-modal-body">
          <div class="ds3-detail-summary" id="ds3DetailSummary"></div>
          <div class="ds3-grid-2">
            <div class="ds3-panel"><div class="ds3-panel-title">银行流入 vs 销项税价合计（月度）</div><div class="ds3-chart ds3-chart-sm" id="ds3DetailInChart"></div></div>
            <div class="ds3-panel"><div class="ds3-panel-title">银行流出 vs 进项税价合计（月度）</div><div class="ds3-chart ds3-chart-sm" id="ds3DetailOutChart"></div></div>
          </div>
          <div class="ds3-panel ds3-mt16"><div class="ds3-panel-title">银行流水明细</div><div class="ds3-table-wrap ds3-detail-table-wrap"><table class="ds3-table ds3-table-compact" id="ds3TxnDetailTable"><thead id="ds3TxnDetailHead"></thead><tbody id="ds3TxnDetailBody"></tbody></table></div></div>
          <div class="ds3-panel ds3-mt16">
            <div class="ds3-panel-headline">
              <div class="ds3-panel-title">增值税明细</div>
              <div class="ds3-vat-detail-tabs" id="ds3VatDetailTabs">
                <button class="is-active" data-vat-type="sales" type="button">销项税</button>
                <button data-vat-type="purchase" type="button">进项税</button>
              </div>
            </div>
            <div class="ds3-table-wrap ds3-detail-table-wrap"><table class="ds3-table ds3-table-compact" id="ds3VatDetailTable"><thead id="ds3VatDetailHead"></thead><tbody id="ds3VatDetailBody"></tbody></table></div>
          </div>
          <div class="ds3-panel ds3-mt16"><div class="ds3-panel-title">备注区</div><textarea class="ds3-note-input" id="ds3DetailRemark" placeholder="填写项目备注"></textarea><div class="ds3-note-meta" id="ds3DetailRemarkMeta">备注仅做项目记录，不参与计算。</div><button class="ds3-btn is-primary" id="ds3SaveRemarkBtn" type="button">保存备注</button></div>
        </div>
      </div>
    </div>

    <div class="ds3-modal" id="ds3SelectedModal">
      <div class="ds3-modal-panel ds3-modal-panel-xl">
        <div class="ds3-modal-head"><div class="ds3-modal-title" id="ds3SelectedTitle">勾选结果</div><button class="ds3-close" id="ds3SelectedClose" type="button">×</button></div>
        <div class="ds3-modal-body">
          <div class="ds3-selected-hint" id="ds3SelectedHint"></div>
          <div class="ds3-table-wrap ds3-selected-table-wrap">
            <table class="ds3-table ds3-table-compact" id="ds3SelectedTable">
              <thead id="ds3SelectedHead"></thead>
              <tbody id="ds3SelectedBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="ds3-modal" id="ds3BatchShiftModal">
      <div class="ds3-modal-panel ds3-modal-panel-md">
        <div class="ds3-modal-head"><div class="ds3-modal-title">批量平移账期</div><button class="ds3-close" id="ds3BatchShiftClose" type="button">×</button></div>
        <div class="ds3-modal-body">
          <div class="ds3-batch-shift-intro" id="ds3BatchShiftIntro"></div>
          <div class="ds3-batch-shift-control">
            <label>税票平移</label>
            <input id="ds3BatchShiftInput" type="number" min="-12" max="12" value="0"/>
            <span>月</span>
          </div>
          <div class="ds3-batch-shift-control">
            <label>账期对象</label>
            <select id="ds3BatchShiftBasis">
              <option value="all">全部</option>
              <option value="receipt">收款</option>
              <option value="payment">付款</option>
            </select>
          </div>
          <div class="ds3-batch-shift-list" id="ds3BatchShiftList"></div>
          <div class="ds3-modal-actions">
            <button class="ds3-btn" id="ds3BatchShiftClear" type="button">恢复全局口径</button>
            <button class="ds3-btn is-primary" id="ds3BatchShiftApply" type="button">应用到勾选对手方</button>
          </div>
        </div>
      </div>
    </div>

    <div class="ds3-modal" id="ds3PeriodDetailModal">
      <div class="ds3-modal-panel ds3-modal-panel-lg">
        <div class="ds3-modal-head"><div><div class="ds3-modal-title">详细月份变化</div><div class="ds3-modal-subtitle" id="ds3PeriodDetailSubtitle"></div></div><button class="ds3-close" id="ds3PeriodDetailClose" type="button">×</button></div>
        <div class="ds3-modal-body">
          <div class="ds3-period-detail-note" id="ds3PeriodDetailNote"></div>
          <div class="ds3-table-wrap">
            <table class="ds3-table ds3-table-compact">
              <thead><tr><th>月份</th><th class="is-num">银行金额</th><th class="is-num">同期税票金额</th><th class="is-num">当前口径税票金额</th><th class="is-num">税票变化金额</th><th class="is-num">对比金额</th></tr></thead>
              <tbody id="ds3PeriodDetailRows"></tbody>
            </table>
          </div>
          <div class="ds3-modal-actions">
            <button class="ds3-btn is-primary" id="ds3PeriodDetailApply" type="button">设为当前口径</button>
            <button class="ds3-btn" id="ds3PeriodDetailCancel" type="button">关闭</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../assets/js/pages/data-summary.js?v=20260508-vat-compare-13"></script>
</body>
</html>
