<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>功能升级中</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #f5f9ff 0%, #eef4ff 100%);
      color: #1f2d3d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .upgrade-card {
      width: 90%;
      max-width: 720px;
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 36px;
      box-shadow: 0 18px 50px rgba(34, 87, 188, 0.12);
      text-align: center;
      border: 1px solid #e8eef8;
    }

    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #dbeafe, #eff6ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 30px;
      color: #1d4ed8;
    }

    .status {
      display: inline-block;
      padding: 8px 18px;
      margin-bottom: 22px;
      border-radius: 999px;
      background: #eff6ff;
      color: #2563eb;
      font-size: 14px;
      font-weight: 600;
    }

    p {
      margin: 0 auto 16px;
      max-width: 560px;
      line-height: 1.8;
      color: #475569;
      font-size: 16px;
    }

    .btn-group {
      margin-top: 30px;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="upgrade-card">
    <div class="icon">⚙️</div>
    <h1>财务数据分析</h1>
<div class="status">功能正在升级</div>
<p>
  当前模块正在进行能力扩展与页面优化，后续将支持更丰富的指标分析、
  趋势展示与辅助判断功能。
</p >
<p>
  请稍后访问，敬请期待升级后的完整版本。
</p >


  </div>
</body>
</html>
